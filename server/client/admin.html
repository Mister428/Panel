<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>CHAPEAU NOIR PANEL – Admin</title>
  <link rel="stylesheet" href="css/style.css" />
  <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;600;800&family=Inter:wght@400;600;800&display=swap" rel="stylesheet" />
</head>
<body>
  <canvas id="matrix"></canvas>
  <div class="noise"></div>

  <div class="wrap">
    <header class="topbar">
      <div class="topbar-inner">
        <div class="brand">
          <div class="logo">CN</div>
          <div>
            <h1>CHAPEAU NOIR PANEL — Admin</h1>
            <small>Gestion des utilisateurs</small>
          </div>
        </div>
        <div class="clock" id="clock"></div>
      </div>
    </header>

    <section>
      <div class="section-title">
        <h3>Utilisateurs</h3>
        <p>Approuve ou supprime des comptes.</p>
      </div>
      <div id="users-list" class="grid"></div>
    </section>

    <footer class="footer">
      <p>2026 © CHAPEAU NOIR PANEL</p>
    </footer>
  </div>

  <div class="toast" id="toast"></div>

  <script type="module" src="js/ui.js"></script>
  <script type="module" src="js/api.js"></script>
  <script type="module" src="js/admin.js"></script>
</body>
</html>
